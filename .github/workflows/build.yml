name: Create new release

on:
  push:
    branches:
      - "**"
    tags:
      - "!**"

jobs:
  build:
    name: Build
    #https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners
    #runs-on: ubuntu-latest # Not working with  ubuntu-latest /  ubuntu-22.04
    # Error: /lib/x86_64-linux-gnu/libgio-2.0.so.0: undefined symbol: g_module_open_full
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v6
    - name: install fuse and libfuse2
      run: sudo apt install fuse libfuse2

    - name: Get pkg2appimage
      run: |
        set -x
        #wget -q https://github.com/AppImageCommunity/pkg2appimage/releases/download/continuous/pkg2appimage--x86_64.AppImage
        wget -q https://github.com/AppImageCommunity/pkg2appimage/releases/download/continuous/pkg2appimage-1eceb30-x86_64.AppImage -O pkg2appimage-x86_64.AppImage
        chmod +x pkg2appimage-x86_64.AppImage
        pwd; ls -lah

    - name: Make AppImage
      run:  |
        set -x
        ./pkg2appimage-x86_64.AppImage Wireshark.yml

    - name: Get appimagetool
      run: |
        #wget -q -c "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
        version_go_appimage=$(wget -q -O - https://api.github.com/repos/probonopd/go-appimage/releases | grep "\"name.*appimagetool-.*-x86_64.AppImage\"" | head -n 1 | cut -d '-' -f2)
        echo "version_go_appimage: $version_go_appimage"
        wget -q "https://github.com/probonopd/go-appimage/releases/download/continuous/appimagetool-$version_go_appimage-x86_64.AppImage" -O appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

    - name: Extract AppImage and rebuilt to remove need of libfuse.so.2
      run: |
        set -x
        cd out/
        pwd; ls -lah

        fileName=$(ls Wireshark*.AppImage)
        chmod +x "$fileName"
        ./"$fileName" --appimage-extract
        rm Wireshark*.AppImage
        pwd; ls -lah

        mv ../appimagetool-x86_64.AppImage .
        version=$(echo "fileName" | cut -d '-' -f2 | cut -d '.' -f1-3)

        ARCH=x86_64 VERSION="${version}-1_JB" ./appimagetool-x86_64.AppImage squashfs-root/
        pwd; ls -lah

    - name: Get URUNTIME
      run: |
        set -x
        wget -q https://github.com/VHSgunzo/uruntime/releases/latest/download/uruntime-appimage-dwarfs-x86_64 -O uruntime
        chmod +x uruntime
        pwd; ls -lah

    - name: Install llvm - URUNTIME
      run: sudo apt install llvm

    - name: List files and rename AppImage
      run: |
        set -x
        cd out/
        pwd; ls -lah

        mv ../uruntime ./
        echo "Generating zsync file..."
        zsyncmake *.AppImage -u *.AppImage

        fileName=$(ls Wireshark*.AppImage) 
        echo "fileName: $fileName"
        fileNameNew=$(echo "$fileName" | sed 's/.AppImage//')
        mv "$fileName" "${fileNameNew}-1_JB.AppImage"
        md5sum "${fileNameNew}-1_JB.AppImage" > "${fileNameNew}-1_JB.AppImage.md5"
        pwd; ls -lah

    - uses: xresloader/upload-to-github-release@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          file: "out/Wireshark-*.AppImage; out/Wireshark-*.zsync; out/Wireshark-*.md5"
          #overwrite: true
          verbose: true
          draft: false
          default_release_name: "Wireshark V in AppImage"
